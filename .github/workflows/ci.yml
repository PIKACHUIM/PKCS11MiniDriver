name: CI

on:
  push:
    branches: [ "master", "main", "develop" ]
  pull_request:
    branches: [ "master", "main" ]

env:
  GO_VERSION: "1.22"


concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================================================
  # Job 1: clients Go 测试 + lint
  # ================================================================
  test-client-card:
    name: Test clients (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: clients/go.sum

      - name: Download dependencies
        working-directory: clients
        run: go mod download

      - name: Vet
        working-directory: clients
        run: go vet ./...

      - name: Test (with race detector)
        working-directory: clients
        run: go test -v -race -count=1 -timeout=120s -coverprofile=coverage.out ./test/...

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-clients
          path: clients/coverage.out

  # ================================================================
  # Job 2: servers Go 测试
  # ================================================================
  test-server-card:
    name: Test servers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check if servers exists
        id: check
        run: |
          if [ -f server-card/go.mod ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Go
        if: steps.check.outputs.exists == 'true'
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: servers/go.sum

      - name: Download dependencies
        if: steps.check.outputs.exists == 'true'
        working-directory: servers
        run: go mod download

      - name: Vet
        if: steps.check.outputs.exists == 'true'
        working-directory: servers
        run: go vet ./...

      - name: Test
        if: steps.check.outputs.exists == 'true'
        working-directory: servers
        run: go test -v -count=1 -timeout=60s ./...

  # ================================================================
  # Job 3: clients 跨平台构建
  # ================================================================
  build-client-card:
    name: Build clients
    runs-on: ubuntu-latest
    needs: [test-client-card]

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            output: clients-linux-amd64
          - goos: linux
            goarch: arm64
            output: clients-linux-arm64
          - goos: darwin
            goarch: amd64
            output: clients-darwin-amd64
          - goos: darwin
            goarch: arm64
            output: clients-darwin-arm64
          - goos: windows
            goarch: amd64
            output: clients-windows-amd64.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: clients/go.sum

      - name: Build
        working-directory: clients
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: go build -ldflags="-s -w" -o ${{ matrix.output }} ./cmd/clients

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: clients/${{ matrix.output }}

  # ================================================================
  # Job 4: pkcs11-mock C 驱动构建（Linux）
  # ================================================================
  build-driver-linux:
    name: Build pkcs11-mock (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential gcc-multilib

      - name: Build x86_64
        working-directory: drivers/build/linux
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkcs11-mock-linux
          path: drivers/build/linux/pkcs11-mock-*.so

  # ================================================================
  # Job 5: pkcs11-mock C 驱动构建（macOS）
  # ================================================================
  build-driver-macos:
    name: Build pkcs11-mock (macOS)
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        working-directory: drivers/build/macos
        run: make

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: pkcs11-mock-macos
          path: drivers/build/macos/pkcs11-mock-*.dylib

  # ================================================================
  # Job 6: 前端构建
  # ================================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: webpage/package-lock.json

      - name: Install dependencies
        working-directory: webpage
        run: npm ci

      - name: Build
        working-directory: webpage
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: webpage/dist/

  # ================================================================
  # Job 7: 安全扫描（仅 push 到 master）
  # ================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    needs: [test-client-card, test-server-card]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck (clients)
        working-directory: clients
        run: govulncheck ./...
        continue-on-error: true

      - name: Run govulncheck (servers)
        working-directory: servers
        run: govulncheck ./...
        continue-on-error: true
