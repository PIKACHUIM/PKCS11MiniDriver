name: Release Beta

on:
  push:
    tags:
      - "v*-beta*"   # 匹配 v0.1.0-beta.1、v1.0.0-beta 等
      - "v*-rc*"     # 匹配 v1.0.0-rc.1 等

# 同一 tag 只保留最新一次运行
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  APP_NAME: client-card

jobs:
  # ================================================================
  # Job 1: 测试（必须通过才能发布）
  # ================================================================
  test:
    name: Test before release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: client-card/go.sum

      - name: Run tests
        working-directory: client-card
        run: go test -v -race -count=1 -timeout=120s ./test/...

  # ================================================================
  # Job 2: 跨平台构建 beta 二进制
  # ================================================================
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: [test]

    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            asset_name: client-card-linux-amd64
          - goos: linux
            goarch: arm64
            asset_name: client-card-linux-arm64
          - goos: darwin
            goarch: amd64
            asset_name: client-card-darwin-amd64
          - goos: darwin
            goarch: arm64
            asset_name: client-card-darwin-arm64
          - goos: windows
            goarch: amd64
            asset_name: client-card-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: client-card/go.sum

      - name: Build binary
        working-directory: client-card
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build \
            -ldflags="-s -w -X main.Version=${{ github.ref_name }} -X main.BuildTime=$(date -u +%Y-%m-%dT%H:%M:%SZ) -X main.Commit=${{ github.sha }}" \
            -o ${{ matrix.asset_name }} \
            ./cmd/client-card

      - name: Compress (non-Windows)
        if: matrix.goos != 'windows'
        working-directory: client-card
        run: |
          tar czf ${{ matrix.asset_name }}.tar.gz ${{ matrix.asset_name }}
          echo "ASSET_FILE=${{ matrix.asset_name }}.tar.gz" >> $GITHUB_ENV

      - name: Compress (Windows)
        if: matrix.goos == 'windows'
        working-directory: client-card
        run: |
          zip ${{ matrix.asset_name }}.zip ${{ matrix.asset_name }}
          echo "ASSET_FILE=${{ matrix.asset_name }}.zip" >> $GITHUB_ENV

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: client-card/${{ env.ASSET_FILE }}
          retention-days: 7

  # ================================================================
  # Job 3: 构建 pkcs11-mock C 驱动
  # ================================================================
  build-driver:
    name: Build pkcs11-mock driver
    needs: [test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux
            artifact: pkcs11-mock-linux.tar.gz
          - os: macos-latest
            name: macos
            artifact: pkcs11-mock-macos.tar.gz

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install build tools (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential

      - name: Build driver
        working-directory: drivers/build/${{ matrix.name }}
        run: make

      - name: Package driver
        working-directory: drivers/build/${{ matrix.name }}
        run: |
          tar czf ${{ matrix.artifact }} pkcs11-mock-*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: drivers/build/${{ matrix.name }}/${{ matrix.artifact }}
          retention-days: 7

  # ================================================================
  # Job 4: 创建 GitHub Release（beta/pre-release）
  # ================================================================
  release:
    name: Create Beta Release
    runs-on: ubuntu-latest
    needs: [build, build-driver]
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      - name: Generate changelog
        id: changelog
        run: |
          # 获取上一个 tag
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "${{ github.ref_name }}" | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi
          echo "## 变更内容" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          git log ${PREV_TAG}..${{ github.ref_name }} \
            --pretty=format:"- %s (%h)" \
            --no-merges >> CHANGELOG.md || \
          git log --pretty=format:"- %s (%h)" --no-merges -20 >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## ⚠️ Beta 版本说明" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "此版本为 **Beta 测试版**，可能存在未知问题，请勿用于生产环境。" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "### 安装说明" >> CHANGELOG.md
          echo "- Linux/macOS: 解压 \`.tar.gz\` 后运行 \`./client-card\`" >> CHANGELOG.md
          echo "- Windows: 解压 \`.zip\` 后运行 \`client-card.exe\`" >> CHANGELOG.md
          cat CHANGELOG.md

      - name: List dist files
        run: find dist/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ env.APP_NAME }} ${{ github.ref_name }}"
          body_path: CHANGELOG.md
          prerelease: true
          draft: false
          files: |
            dist/**/*.tar.gz
            dist/**/*.zip
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
