appId: com.globaltrusts.opencert-manager
productName: OpenCert Manager
copyright: Copyright © 2024 GlobalTrusts

directories:
  output: release
  buildResources: public

files:
  - dist/**/*
  - electron/**/*
  - public/**/*

win:
  target:
    - target: nsis
      arch:
        - x64
        - ia32
  icon: public/icon.png

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: public/icon.png
  uninstallerIcon: public/icon.png
  installerHeaderIcon: public/icon.png

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: public/icon.png
  category: public.app-category.utilities

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file

linux:
  target:
    - target: AppImage
      arch:
        - x64
    - target: deb
      arch:
        - x64
  icon: public/icon.png
  category: Utility
